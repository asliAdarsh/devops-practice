name: "Terraform Cloud Automation Pipeline"

on:
  push:
    branches:
      - main
    paths:
      - 'terraform-practices/gcp-practice/level-9-pipeline/**'

jobs:
  terraform:
    name: "Automated Deploy Run"
    runs-on: ubuntu-latest

    env:
      TF_VAR_project_id: "test-project-18792"

    defaults:
      run:
        working-directory: terraform-practices/gcp-practice/level-9-pipeline

    steps:
      - name: "1. Checkout Source Code"
        uses: actions/checkout@v4

      - name: "2. Authenticate securely to Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: "3. Setup HashiCorp Terraform CLI"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: "4. Configure Terraform Environment Wrapper"
        run: echo "TF_IN_AUTOMATION=true" >> $GITHUB_ENV

      - name: "5. Check Code Formatting Syntax"
        run: terraform fmt -check

      - name: "6. Initialize State Connection"
        run: terraform init

      - name: "7. Validate Code Integrity Structure"
        run: terraform validate

      - name: "8. Execute Automated Run"
        run: terraform apply -auto-approve