apiVersion: apps/v1
kind: Deployment
metadata:
  name: totes-frontend 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: totes-frontend
  template:
    metadata:
      labels:
        app: totes-frontend 
    spec:
      containers:
        - name: frontend
          image: asliadarsh/todo-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: ClusterIP
  ports: 
    - port: 80
      targetPort: 80
  selector: 
    app: totes-frontend  # Double-check that this has exactly 4 spaces of indentation!