apiVersion: networking.k8s.io/v1

kind: Ingress
metadata:
  name: totes-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # This strips out the "/api" segment from the URL before forwarding it to FastAPI
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
  - http:
      paths:
      - path: /(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend-service  # Matches your frontend service name exactly
            port:
              number: 80
      - path: /api/?(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: backend-service   # Matches your backend service name exactly
            port:
              number: 8000