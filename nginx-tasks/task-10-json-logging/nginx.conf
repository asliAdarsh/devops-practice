# ===========================================
# Nginx JSON Logging Configuration
# ===========================================
# The Data Miner — outputs logs in JSON format
# for easy parsing by log aggregation tools.

http {
    # =============================================
    # Custom JSON Log Format
    # =============================================
    # The escape=json parameter ensures special characters
    # in variables (like quotes, newlines) are properly escaped.
    #
    # Each log entry becomes a JSON object with these fields:

    log_format json_log escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"method":"$request_method",'
        '"path":"$uri",'
        '"query_string":"$query_string",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"server_name":"$server_name",'
        '"server_protocol":"$server_protocol",'
        '"bytes_sent":$bytes_sent,'
        '"connection":$connection,'
        '"request_length":$request_length,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"ssl_protocol":"$ssl_protocol",'
        '"ssl_cipher":"$ssl_cipher"'
    '}';

    # =============================================
    # JSON Error Log Format
    # =============================================
    log_format json_error escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"level":"$log_level",'
        '"message":"$log_message",'
        '"pid":$pid,'
        '"connection":$connection'
    '}';

    server {
        listen 80;
        server_name localhost;

        # ---- Access Log (JSON format) ----
        # Write to file with buffering for performance
        # buffer=32k: Write in 32KB chunks
        # flush=5s: Flush every 5 seconds (even if buffer not full)
        access_log /var/log/nginx/access.json.log json_log buffer=32k flush=5s;

        # ---- Error Log (JSON format) ----
        # warn = log warnings and above
        error_log /var/log/nginx/error.json.log warn;

        # ---- Also keep default format for comparison ----
        access_log /var/log/nginx/access.log buffer=32k;

        # ---- Root Location ----
        location / {
            # Return a simple response so we can test logging
            default_type application/json;
            return 200 '{"message":"JSON logging is working!"}';
        }

        # ---- Trigger some different status codes ----
        location /notfound {
            return 404 '{"error":"Not Found"}';
        }

        location /error {
            return 500 '{"error":"Internal Server Error"}';
        }

        location /redirect {
            return 301 /;
        }
    }
}
