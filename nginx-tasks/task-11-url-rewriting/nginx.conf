# ===========================================
# Nginx URL Rewriting Configuration
# ===========================================
# The Masquerade — rewrites and redirects URLs

http {
    server {
        listen 80;
        server_name localhost;

        # =============================================
        # Simple Redirects (using 'return')
        # =============================================
        # Use 'return' for simple, static redirects
        # (faster than 'rewrite')

        # Permanent redirect (301): old page to new page
        location /old-page {
            return 301 /new-page;
        }

        # Temporary redirect (302): temporary move
        location /temp {
            return 302 /new-page;
        }

        # Redirect with a new domain (external redirect)
        location /external {
            return 301 https://example.com$request_uri;
        }

        # =============================================
        # Regex-Based Rewrites
        # =============================================
        # Syntax: rewrite <regex> <replacement> <flag>;

        # Rewrite /products/42 → /product?id=42
        # The ^/products/(\d+)$ pattern matches:
        #   ^ = start of string
        #   /products/ = literal path
        #   (\d+) = capture one or more digits as $1
        #   $ = end of string
        location /products {
            rewrite ^/products/(\d+)$ /product?id=$1 last;
        }

        location /product {
            default_type application/json;
            return 200 '{"message":"Product page","product_id":"$arg_id"}';
        }

        # Rewrite /user/username → /profile?user=username
        location /user {
            rewrite ^/user/(.+)$ /profile?username=$1 last;
        }

        location /profile {
            default_type application/json;
            return 200 '{"message":"User profile","username":"$arg_username"}';
        }

        # =============================================
        # SEO-Friendly URLs
        # =============================================
        # /articles/hello-world → /article.php?slug=hello-world
        location /articles {
            rewrite ^/articles/([^/]+)$ /article?slug=$1 last;
        }

        location /article {
            default_type application/json;
            return 200 '{"message":"Article","slug":"$arg_slug"}';
        }

        # =============================================
        # URL Normalization
        # =============================================
        # Remove trailing slash from directory URLs
        location /directory/ {
            rewrite ^/directory/(.*)$ /directory/$1 permanent;
        }

        # Force lowercase URLs
        location ~* ^/[A-Z] {
            rewrite ^(.*)$ /lowercase$1 permanent;
        }

        # =============================================
        # try_files (SPA Fallback)
        # =============================================
        # For Single Page Applications
        # /app/some/route → serves /app/index.html
        location /app {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /app/index.html;
        }

        # =============================================
        # Preventing Redirect Loops
        # =============================================
        # This rewrite checks if we're already on the target
        # before rewriting, preventing infinite loops
        location /loop {
            if ($uri !~ ^/final-destination) {
                rewrite ^ /final-destination permanent;
            }
        }

        location /final-destination {
            default_type application/json;
            return 200 '{"message":"Loop prevention works!"}';
        }

        # =============================================
        # New Main Route
        # =============================================
        location /new-page {
            default_type application/json;
            return 200 '{"message":"You reached the new page!"}';
        }

        # =============================================
        # Root — Catch All
        # =============================================
        location / {
            default_type application/json;
            return 200 '{"message":"Try URL rewriting!","paths":["/old-page","/temp","/products/42","/user/john","/articles/hello","/app/route1"]}';
        }
    }
}
