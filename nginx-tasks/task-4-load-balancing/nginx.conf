# ===========================================
# Nginx Load Balancer Configuration
# ===========================================

# Define the upstream (backend server group)
# Requests are distributed across these servers
upstream backend_servers {
    # ---- Load Balancing Algorithms ----
    # Default: round-robin (no directive needed)
    # Uncomment one of these to change the algorithm:

    # least_conn;  # Send to server with fewest active connections
    # ip_hash;     # Same client always goes to same server

    # Define backend servers with their internal Docker network addresses
    # Each backend runs on port 3000 inside its container
    server backend1:3000 weight=3 max_fails=3 fail_timeout=30s;
    server backend2:3000 weight=2 max_fails=3 fail_timeout=30s;
    server backend3:3000 weight=1 max_fails=3 fail_timeout=30s;
}

server {
    # Listen on port 80 for incoming HTTP traffic
    listen 80;

    # Server name (can be domain or localhost)
    server_name localhost;

    # Forward all requests to the upstream backend group
    location / {
        proxy_pass http://backend_servers;

        # Forward important headers to the backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # Health check endpoint (returns Nginx status)
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
