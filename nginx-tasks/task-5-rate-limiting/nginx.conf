# ===========================================
# Nginx Rate Limiting Configuration
# ===========================================
# The Bouncer — controls traffic flow to protect backends

# ---- HTTP Block ----
http {
    # =============================================
    # Define Rate Limit Zones
    # =============================================
    # Syntax: limit_req_zone <key> zone=<name>:<size> rate=<rate>;
    #
    # Key: $binary_remote_addr = client IP address (binary format saves memory)
    # Zone: ratelimit = zone name, 10MB = memory allocated
    # Rate: 1r/s = 1 request per second
    #
    # This zone tracks requests per unique IP address

    limit_req_zone $binary_remote_addr zone=ratelimit:10m rate=1r/s;

    # Optional: A more restrictive zone for sensitive endpoints
    limit_req_zone $binary_remote_addr zone=strict:10m rate=1r/m;

    # ---- Server Block ----
    server {
        listen 80;
        server_name localhost;

        # Apply rate limiting to the root location
        location / {
            # Apply the rate limit zone
            # rate=1r/s, burst=5 allows up to 5 extra requests queued
            # nodelay processes burst requests immediately
            limit_req zone=ratelimit burst=5 nodelay;

            # Custom status code when limit is exceeded (429 = Too Many Requests)
            limit_req_status 429;

            # Log when rate limiting is triggered
            limit_req_log_level warn;

            # Proxy to backend
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # A stricter limited endpoint
        location /api/ {
            limit_req zone=strict burst=2 nodelay;
            limit_req_status 429;

            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
        }

        # Health check endpoint (no rate limiting)
        location /health {
            proxy_pass http://backend:3000/health;
            # No limit_req here — health checks bypass rate limiting
        }
    }
}
