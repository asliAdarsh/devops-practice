# ===========================================
# Nginx Access Control Configuration
# ===========================================
# The Spy — controls who can access your server

http {
    server {
        listen 80;
        server_name localhost;

        # =============================================
        # Root Location — IP-Based Access Control
        # =============================================
        location / {
            # ---- IP Allow/Deny Rules ----
            # Order matters: Nginx processes rules top-to-bottom
            # The LAST matching rule wins

            # Allow localhost / this machine
            allow 127.0.0.1;
            allow 192.168.0.0/16;    # Allow entire private network range

            # Deny all other IP addresses
            deny all;

            # Proxy to backend
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # =============================================
        # Admin Location — Basic Authentication
        # =============================================
        location /admin {
            # Use "satisfy any" so that IP whitelist OR valid credentials work
            satisfy any;

            # IP-based access (allow local network)
            allow 127.0.0.1;
            allow 192.168.0.0/16;

            # Deny all others (forces them to authenticate)
            deny all;

            # Basic Authentication
            auth_basic "Restricted Area — Enter Admin Credentials";
            auth_basic_user_file /etc/nginx/.htpasswd;

            # Proxy to backend
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
        }

        # =============================================
        # Public Endpoint — No Access Control
        # =============================================
        location /public {
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            # No allow/deny — accessible to everyone
        }
    }
}
