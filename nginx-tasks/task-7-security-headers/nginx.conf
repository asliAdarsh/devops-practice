# ===========================================
# Nginx Security Headers Configuration
# ===========================================
# The Hardened Shell — protects users with strong security headers

http {
    # Include MIME types (needed for proper content type detection)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # =============================================
        # Security Headers
        # =============================================
        # The "always" parameter ensures headers are sent
        # even on error responses (4xx, 5xx).

        # ---- Clickjacking Protection ----
        # DENY = cannot be embedded in any iframe
        # SAMEORIGIN = only iframes from same origin allowed
        add_header X-Frame-Options "DENY" always;

        # ---- MIME Type Sniffing Protection ----
        # Prevents browser from guessing content types
        add_header X-Content-Type-Options "nosniff" always;

        # ---- XSS Protection (legacy) ----
        # Enables browser's XSS filter
        # mode=block prevents rendering if XSS detected
        add_header X-XSS-Protection "1; mode=block" always;

        # ---- HTTP Strict Transport Security (HSTS) ----
        # Forces HTTPS for 1 year, including subdomains
        # Only enable when HTTPS is working!
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ---- Content Security Policy (CSP) ----
        # Controls which resources can be loaded
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self';
            style-src 'self' 'unsafe-inline';
            img-src 'self' data:;
            font-src 'self';
            connect-src 'self';
            frame-ancestors 'none';
            form-action 'self';
            base-uri 'self';
        " always;

        # ---- Referrer Policy ----
        # Controls what referrer info is sent
        # no-referrer = no referrer info sent at all
        add_header Referrer-Policy "no-referrer" always;

        # ---- Permissions Policy (replaces Feature Policy) ----
        # Controls which browser APIs your site can use
        add_header Permissions-Policy "
            geolocation=(),
            camera=(),
            microphone=(),
            payment=(),
            usb=(),
            microphone=(),
            interest-cohort=()
        " always;

        # ---- Cache Control ----
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        # ---- Remove Nginx Version Header ----
        # Don't advertise which Nginx version you're running
        server_tokens off;

        # =============================================
        # Proxy to Backend
        # =============================================
        location / {
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
