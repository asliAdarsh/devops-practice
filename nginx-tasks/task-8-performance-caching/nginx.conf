# ===========================================
# Nginx Performance Caching Configuration
# ===========================================
# The Accelerator — speeds up responses with caching and gzip

http {
    # =============================================
    # Cache Zone Definition
    # =============================================
    # Syntax: proxy_cache_path <path> levels=<dirs> keys_zone=<name>:<size>
    #                         max_size=<size> inactive=<time>
    #
    # path: Where cache files are stored on disk
    # levels: Directory hierarchy (2 levels helps with large caches)
    # keys_zone: Shared memory zone for cache keys (1MB = ~8000 keys)
    # max_size: Maximum disk space for cache
    # inactive: Remove items not accessed in this time

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=mycache:10m
                     max_size=1g inactive=60m use_temp_path=off;

    # =============================================
    # Gzip Compression
    # =============================================
    gzip on;
    gzip_comp_level 6;           # Compression level (1=fast, 9=max)
    gzip_min_length 256;         # Don't compress tiny responses
    gzip_proxied any;            # Compress proxied responses too
    gzip_vary on;                # Add Vary: Accept-Encoding header
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    server {
        listen 80;
        server_name localhost;

        # =============================================
        # Main Location with Caching
        # =============================================
        location / {
            # Enable caching using the 'mycache' zone
            proxy_cache mycache;

            # Define what makes a cache entry unique
            proxy_cache_key $scheme$proxy_host$uri$is_args$args;

            # Cache 200 and 302 responses for 1 minute
            # Cache 404 responses for 1 minute
            proxy_cache_valid 200 302 1m;
            proxy_cache_valid 404 1m;

            # Bypass cache when query param 'nocache' is present
            proxy_cache_bypass $arg_nocache;

            # Don't cache when query param 'nocache' is present
            proxy_no_cache $arg_nocache;

            # Add custom header showing cache status (HIT/MISS/BYPASS/EXPIRED)
            add_header X-Cache $upstream_cache_status always;

            # Add header showing cache age
            add_header X-Cache-Age $upstream_http_age always;

            # Lock caching to prevent cache stampede
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;

            # Forward request to backend
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # =============================================
        # Cache Status Location (bypasses cache)
        # =============================================
        location /cache-status {
            proxy_pass http://backend:3000/cache-status;
            proxy_cache_bypass 1;  # Always bypass cache
            proxy_no_cache 1;      # Never cache
        }
    }
}
